name: Sapphire vendor parity

on:
  pull_request:
    paths:
      - 'src/frontend/qt_sdl/VulkanReference/**'
      - 'src/SapphireGPU2DCore/**'
      - 'tools/sapphire_vendor_manifest.json'
      - 'tools/check_sapphire_vendor_parity.py'
      - 'tools/vendor_sapphire.py'
      - 'tools/test_sapphire_vendor_parity.py'
      - 'tools/test_sapphire_gpu2d_lifecycle_parity.py'
      - 'tools/test_sapphire_gpu2d_runtime_gate_parity.py'
      - 'src/SapphireVendor/**'
  push:
    branches:
      - highres_fonts_v3
      - main
    paths:
      - 'src/frontend/qt_sdl/VulkanReference/**'
      - 'src/SapphireGPU2DCore/**'
      - 'tools/sapphire_vendor_manifest.json'
      - 'tools/check_sapphire_vendor_parity.py'
      - 'tools/vendor_sapphire.py'
      - 'tools/test_sapphire_vendor_parity.py'
      - 'tools/test_sapphire_gpu2d_lifecycle_parity.py'
      - 'tools/test_sapphire_gpu2d_runtime_gate_parity.py'
      - 'src/SapphireVendor/**'

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout Sapphire Android frontend
        uses: actions/checkout@v4
        with:
          repository: SapphireRhodonite/melonDS-android
          ref: 0.7.0.rc4
          path: sapphire-android
      - name: Checkout Sapphire Android core
        uses: actions/checkout@v4
        with:
          repository: SapphireRhodonite/melonDS-android-lib
          ref: d77944275fa61f9b79cfcead2c3e98993429a023
          path: sapphire-android-lib
      - name: Verify Sapphire parity
        env:
          SAPPHIRE_ANDROID_ROOT: ${{ github.workspace }}/sapphire-android
          SAPPHIRE_ANDROID_LIB_ROOT: ${{ github.workspace }}/sapphire-android-lib
        run: |
          python3 tools/test_sapphire_vendor_parity.py
          python3 tools/test_sapphire_gpu2d_lifecycle_parity.py
          python3 tools/test_sapphire_gpu2d_runtime_gate_parity.py
          python3 tools/vendor_sapphire.py --verify-upstream-snapshots
          python3 tools/vendor_sapphire.py --verify-generated
          python3 tools/check_sapphire_vendor_parity.py --verify-upstream
