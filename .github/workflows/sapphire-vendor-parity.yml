name: Sapphire vendor parity

on:
  pull_request:
    paths:
      - '.github/workflows/sapphire-vendor-parity.yml'
      - 'src/frontend/qt_sdl/**'
      - 'src/SapphireGPU2DCore/**'
      - 'src/GPU.cpp'
      - 'src/GPU.h'
      - 'src/GPU_Soft.*'
      - 'src/GPU2D.*'
      - 'src/SapphirePublished2DFrame.*'
      - 'src/MelonPrimeSapphireGpu2DState.*'
      - 'src/SapphireVendor/**'
      - 'tools/*sapphire*'
      - 'tools/fixtures/**'
      - 'tools/check_vulkan_output_header_contract.py'
      - 'tools/compile_sapphire_generated_core.py'
      - 'tools/generate_sapphire_*'
  push:
    branches:
      - highres_fonts_v3
      - main
    paths:
      - '.github/workflows/sapphire-vendor-parity.yml'
      - 'src/frontend/qt_sdl/**'
      - 'src/SapphireGPU2DCore/**'
      - 'src/GPU.cpp'
      - 'src/GPU.h'
      - 'src/GPU_Soft.*'
      - 'src/GPU2D.*'
      - 'src/SapphirePublished2DFrame.*'
      - 'src/MelonPrimeSapphireGpu2DState.*'
      - 'src/SapphireVendor/**'
      - 'tools/*sapphire*'
      - 'tools/fixtures/**'
      - 'tools/check_vulkan_output_header_contract.py'
      - 'tools/compile_sapphire_generated_core.py'
      - 'tools/generate_sapphire_*'

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout Sapphire Android frontend
        uses: actions/checkout@v4
        with:
          repository: SapphireRhodonite/melonDS-android
          ref: 0.7.0.rc4
          path: sapphire-android
      - name: Checkout Sapphire Android core
        uses: actions/checkout@v4
        with:
          repository: SapphireRhodonite/melonDS-android-lib
          ref: d77944275fa61f9b79cfcead2c3e98993429a023
          path: sapphire-android-lib
      - name: Verify Sapphire parity
        env:
          SAPPHIRE_ANDROID_ROOT: ${{ github.workspace }}/sapphire-android
          SAPPHIRE_ANDROID_LIB_ROOT: ${{ github.workspace }}/sapphire-android-lib
        run: |
          python3 tools/test_sapphire_vendor_parity.py
          python3 tools/test_sapphire_gpu2d_lifecycle_parity.py
          python3 tools/test_sapphire_gpu2d_lifecycle_differential_s78.py
          python3 tools/test_sapphire_gpu2d_runtime_gate_parity.py
          python3 tools/test_sapphire_vulkan_lifecycle_s68_parity.py
          python3 tools/test_sapphire_vulkan_lifecycle_s69_parity.py
          python3 tools/test_sapphire_vulkan_lifecycle_s70_parity.py
          python3 tools/test_sapphire_vulkan_lifecycle_s71_parity.py
          python3 tools/check_vulkan_output_header_contract.py
          python3 tools/generate_sapphire_frame_latch.py --verify
          python3 tools/generate_sapphire_frame_queue.py --verify
          python3 tools/generate_sapphire_gpu2d_event_block.py --verify
          python3 tools/check_sapphire_frame_latch_parity.py --upstream-tag 0.7.0.rc4
          python3 tools/check_sapphire_vulkan_output_exact.py
          python3 tools/test_sapphire_frame_queue_differential.py
          python3 tools/test_sapphire_vulkan_golden_snapshot_s73.py
          python3 tools/test_sapphire_vulkan_flicker_s73.py
          python3 tools/test_sapphire_latch_golden_fixture.py
          python3 tools/test_sapphire_latch_flicker_fixture.py
          python3 tools/test_sapphire_vulkan_lifecycle_source_contract.py
          python3 tools/test_sapphire_vulkan_cold_start_s76.py
          python3 tools/generate_synthetic_nds_boot_rom.py
          python3 tools/test_sapphire_vulkan_cold_start_regression_s79.py
          python3 tools/vendor_sapphire.py --verify-upstream-snapshots
          python3 tools/vendor_sapphire.py --verify-generated
          python3 tools/check_sapphire_vendor_parity.py --verify-upstream

  vulkan-linux-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake g++ qt6-base-dev libarchive-dev libsdl2-dev libenet-dev zlib1g-dev
      - name: Configure Vulkan build (${{ matrix.build_type }})
        run: |
          cmake -S . -B build/sapphire-parity-linux-${{ matrix.build_type }} \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DMELONPRIME_ENABLE_VULKAN=ON \
            -DMELONPRIME_ENABLE_DEVELOPER_FEATURES=OFF
      - name: Build production melonDS binary (${{ matrix.build_type }})
        run: cmake --build build/sapphire-parity-linux-${{ matrix.build_type }} --target melonDS -j 2
      - name: Build Sapphire generated object targets (${{ matrix.build_type }})
        run: |
          cmake --build build/sapphire-parity-linux-${{ matrix.build_type }} --target sapphire_frame_latch_core -j 2
          cmake --build build/sapphire-parity-linux-${{ matrix.build_type }} --target sapphire_frame_queue_core -j 2
          cmake --build build/sapphire-parity-linux-${{ matrix.build_type }} --target sapphire_frame_queue_differential_test -j 2
      - name: Run FrameQueue differential test (${{ matrix.build_type }})
        run: ./build/sapphire-parity-linux-${{ matrix.build_type }}/sapphire_frame_queue_differential_test

  vulkan-windows-build:
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git
      - name: Build production melonPrimeDS.exe (MinGW Release)
        shell: msys2 {0}
        run: |
          ./.claude/skills/build-mingw.bat --jobs 1
          cmake --build build/release-mingw-x86_64 --target sapphire_frame_queue_differential_test -j 1
          ./build/release-mingw-x86_64/sapphire_frame_queue_differential_test.exe
      - name: Generate synthetic cold-start ROM fixture
        shell: msys2 {0}
        run: python tools/generate_synthetic_nds_boot_rom.py
      - name: Run Vulkan ROM cold-start regression gate (S79-8)
        shell: msys2 {0}
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tools/test_sapphire_vulkan_cold_start_regression_s79.py
      - name: Archive expected-crash baseline (diagnostic only)
        if: always()
        shell: msys2 {0}
        env:
          QT_QPA_PLATFORM: offscreen
        continue-on-error: true
        run: python tools/test_sapphire_vulkan_cold_start_reproduction_s78.py

  vulkan-windows-debug-build:
    runs-on: windows-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git
      - name: Build production melonPrimeDS.exe (MinGW Debug)
        shell: msys2 {0}
        run: ./.claude/skills/build-mingw-vulkan-debug.bat --jobs 1
      - name: Generate synthetic cold-start ROM fixture
        shell: msys2 {0}
        run: python tools/generate_synthetic_nds_boot_rom.py
      - name: Run Vulkan ROM cold-start regression gate (Debug)
        shell: msys2 {0}
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tools/test_sapphire_vulkan_cold_start_regression_s79.py

  vulkan-linux-sanitizer-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sanitizer: [asan-ubsan, msan]
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake g++ clang qt6-base-dev libarchive-dev libsdl2-dev libenet-dev zlib1g-dev
      - name: Configure Vulkan sanitizer build (${{ matrix.sanitizer }})
        run: |
          EXTRA_FLAGS=""
          if [ "${{ matrix.sanitizer }}" = "asan-ubsan" ]; then
            EXTRA_FLAGS="-DMELONPRIME_ENABLE_SANITIZERS=ON"
          else
            EXTRA_FLAGS="-DMELONPRIME_ENABLE_MSAN=ON"
          fi
          cmake -S . -B build/sapphire-parity-linux-sanitizer-${{ matrix.sanitizer }} \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DMELONPRIME_ENABLE_VULKAN=ON \
            -DMELONPRIME_ENABLE_DEVELOPER_FEATURES=OFF \
            $EXTRA_FLAGS
      - name: Build production melonDS binary (${{ matrix.sanitizer }})
        run: cmake --build build/sapphire-parity-linux-sanitizer-${{ matrix.sanitizer }} --target melonDS -j 2
      - name: Generate synthetic cold-start ROM fixture
        run: python3 tools/generate_synthetic_nds_boot_rom.py
      - name: Run Vulkan ROM cold-start regression gate (${{ matrix.sanitizer }})
        env:
          QT_QPA_PLATFORM: offscreen
          ASAN_OPTIONS: detect_leaks=0
        run: python3 tools/test_sapphire_vulkan_cold_start_regression_s79.py
