name: BSD

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - ci/*
  pull_request:
    branches:
      - master

env:
  MELONDS_GIT_BRANCH: ${{ github.ref }}
  MELONDS_GIT_HASH: ${{ github.sha }}
  MELONDS_BUILD_PROVIDER: GitHub Actions

jobs:
  build:
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [freebsd, netbsd, openbsd]
        # The emulated aarch64 VMs are quite slow, so disable aarch64
        # runs for now.
        arch: [x86_64] #, aarch64]
        include:
          - os: freebsd
            os_name: FreeBSD
            install_deps: >
              pkg install -y cmake kf6-extra-cmake-modules pkgconf ninja
              qt6-base qt6-multimedia qt6-svg sdl2 libarchive zstd enet
              faad2 zip

          - os: netbsd
            os_name: NetBSD
            # The NetBSD VM image does not come with X sets by default,
            # so download and unpack the sets we need manually.
            # See https://github.com/vmactions/netbsd-vm/issues/2
            # Also, for some reason pkg_add is not in $PATH, so we have
            # to call it using its absolute location.
            prepare_vm: |
              /usr/sbin/pkg_add pkgin curl
              mach=$(uname -m | sed "s/evbarm/evbarm-$(uname -p)/")
              for set in xbase xcomp; do
                curl -sL ${PKG_PATH%%/pkgsrc*}/NetBSD/NetBSD-$(uname -r
                  )/$mach/binary/sets/$set.tar.xz | tar xJpf - -C /
              done
            install_deps: >
              pkgin -y install cmake extra-cmake-modules pkgconf
              ninja-build qt6-qtbase qt6-qtmultimedia qt6-qtsvg SDL2
              libarchive zstd enet faad2 zip

          - os: openbsd
            os_name: OpenBSD
            install_deps: >
              pkg_add -v cmake kf6-extra-cmake-modules pkgconf ninja
              qt6-qtbase qt6-qtmultimedia qt6-qtsvg sdl2 libarchive zstd
              enet faad zip

    name: ${{ matrix.os_name }} / ${{ matrix.arch }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: ${{ matrix.os }} {0}

    steps:
    - uses: actions/checkout@v6
      name: Check out sources

    - name: Start ${{ matrix.os_name }} VM
      uses: jenseng/dynamic-uses@v1
      with:
        uses: vmactions/${{ matrix.os }}-vm@v1
        # As we are using multiple steps, we need to use NFS to sync the
        # workspace between host and VM, as with the default, rsync, the
        # workspace is only synced before and after the setup VM step.
        with: >
          {
            "arch": ${{ matrix.arch }},
            "envs": "MELONDS_GIT_BRANCH MELONDS_GIT_HASH
                     MELONDS_BUILD_PROVIDER",
            "prepare": ${{ toJSON(matrix.prepare_vm) }},
            "sync": "nfs",
            "usesh": "true",
          }

    - name: Install dependencies
      run: ${{ matrix.install_deps }}

    - name: Configure
      run: >
        cmake -S $GITHUB_WORKSPACE -B /tmp/build -G Ninja
        -DMELONDS_EMBED_BUILD_INFO=ON

    - name: Build and stage binary
      # MELONPRIME_BSD_STAGED_ARTIFACT_V2
      # Locate the executable inside the BSD VM, then copy only that file to the
      # NFS-backed workspace under a deterministic per-matrix path.
      run: |
        set -eu
        cmake --build /tmp/build

        stage_dir="$GITHUB_WORKSPACE/bsd-stage/${{ matrix.os }}-${{ matrix.arch }}"
        staged_binary="$stage_dir/melonPrimeDS"
        binary=""

        for candidate in \
          /tmp/build/src/frontend/qt_sdl/melonPrimeDS \
          /tmp/build/src/frontend/qt_sdl/melonDS \
          /tmp/build/melonPrimeDS \
          /tmp/build/melonDS
        do
          if [ -f "$candidate" ]; then
            binary="$candidate"
            break
          fi
        done

        if [ -z "$binary" ]; then
          binary="$(
            find /tmp/build \
              -type f \( -name 'melonPrimeDS' -o -name 'melonDS' \) \
              -print 2>/dev/null | head -n 1 || true
          )"
        fi

        if [ -z "$binary" ] || [ ! -f "$binary" ]; then
          echo "Expected BSD executable was not found after a successful build."
          echo "Candidate executables and files:"
          find /tmp/build -maxdepth 8 -type f -print 2>/dev/null || true
          exit 1
        fi

        mkdir -p "$stage_dir"
        cp -f "$binary" "$staged_binary"
        chmod +x "$staged_binary"
        test -s "$staged_binary"

        echo "Staged BSD executable:"
        ls -l "$staged_binary"

    - name: Compress staged binary
      # Run on the Ubuntu host. Do not rediscover or copy the BSD build tree.
      shell: bash
      run: |
        set -euo pipefail

        staged_binary="$GITHUB_WORKSPACE/bsd-stage/${{ matrix.os }}-${{ matrix.arch }}/melonPrimeDS"
        zip_path="$GITHUB_WORKSPACE/melonPrimeDS-bsd-${{ matrix.os }}-${{ matrix.arch }}.zip"

        if [ ! -s "$staged_binary" ]; then
          echo "Staged BSD executable is missing or empty: $staged_binary"
          echo "Workspace staging contents:"
          find "$GITHUB_WORKSPACE/bsd-stage" -maxdepth 4 -type f -print 2>/dev/null || true
          exit 1
        fi

        python3 - "$zip_path" "$staged_binary" <<'PY'
        import pathlib
        import sys
        import zipfile

        output = pathlib.Path(sys.argv[1])
        source = pathlib.Path(sys.argv[2])
        with zipfile.ZipFile(output, "w", compression=zipfile.ZIP_DEFLATED) as archive:
            archive.write(source, arcname="melonPrimeDS")
        PY

        test -s "$zip_path"
        echo "Created BSD artifact:"
        ls -l "$zip_path"
        python3 -m zipfile -l "$zip_path"

    - name: Upload binary
      uses: actions/upload-artifact@v7
      with:
        name: melonPrimeDS-bsd-${{ matrix.os }}-${{ matrix.arch }}.zip
        path: melonPrimeDS-bsd-${{ matrix.os }}-${{ matrix.arch }}.zip
        archive: false

  all-artifacts:
    name: All BSD artifacts
    needs: [build]
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - name: Download FreeBSD x86_64
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: melonPrimeDS-bsd-freebsd-x86_64.zip
        path: bsd-freebsd-x86_64
        skip-decompress: true

    - name: Download NetBSD x86_64
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: melonPrimeDS-bsd-netbsd-x86_64.zip
        path: bsd-netbsd-x86_64
        skip-decompress: true

    - name: Download OpenBSD x86_64
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: melonPrimeDS-bsd-openbsd-x86_64.zip
        path: bsd-openbsd-x86_64
        skip-decompress: true

    - name: Bundle all BSD artifacts
      run: |
        set -eu
        shopt -s nullglob

        artifacts=(bsd-*/*.zip)

        echo "Downloaded BSD artifact files:"
        find . -maxdepth 3 -type f -print || true

        if [ ${#artifacts[@]} -eq 0 ]; then
          echo "No BSD artifacts available to bundle"
          exit 1
        fi

        zip -j melonPrimeDS-bsd-all.zip "${artifacts[@]}"
        ls -l melonPrimeDS-bsd-all.zip

    - name: Upload bundled BSD artifacts
      uses: actions/upload-artifact@v7
      with:
        name: melonPrimeDS-bsd-all
        path: melonPrimeDS-bsd-all.zip
        archive: false
