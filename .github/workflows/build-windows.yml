name: Windows

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - ci/*
  pull_request:
    branches:
      - master

env:
  VCPKG_COMMIT: 9b965a116838c6cdcd36bca60d1b81b030c8ab8d
  MELONDS_GIT_BRANCH: ${{ github.ref }}
  MELONDS_GIT_HASH: ${{ github.sha }}
  MELONDS_BUILD_PROVIDER: GitHub Actions
#  MELONDS_VERSION_SUFFIX: " RC"
  VCPKG_MAX_CONCURRENCY: 8
  CMAKE_BUILD_PARALLEL_LEVEL: 8
  VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg_binary_cache,readwrite

jobs:
  build:
    runs-on: windows-2025-vs2026

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Check out sources
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Audit MelonPrime config discipline
      shell: pwsh
      run: |
        .\.claude\skills\audit-config-defaults.ps1
        .\.claude\skills\audit-hud-key-parity.ps1 -Strict
        .\.claude\skills\check-inc-ownership.ps1
        .\.claude\skills\audit-metroid-literal-budget.ps1 -Budget 1

    - name: Verify generated HUD schema
      shell: pwsh
      run: |
        python .\.claude\skills\generate-hud-prop-schema.py
        git diff --exit-code -- `
          src/frontend/qt_sdl/MelonPrimeHudPropSchema.inc `
          src/frontend/qt_sdl/InputConfig/MelonPrimeInputConfigHudDialogProps.inc `
          src/frontend/qt_sdl/MelonPrimeHudConfigOnScreenEditProps.inc `
          .claude/rules/notes/MelonPrimeHudPropSchemaPhase2a.md

    - name: Cache MSYS2 packages
      uses: actions/cache@v4
      with:
        path: |
          C:/msys64/var/cache/pacman/pkg
          C:/msys64/etc/pacman.d/gnupg
        key: ${{ runner.os }}-msys2-pacman-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-msys2-pacman-

    - name: Remove stale MSYS2 temp directory
      shell: pwsh
      run: |
        if (Test-Path 'D:\a\_temp\msys64') {
          Remove-Item 'D:\a\_temp\msys64' -Recurse -Force
        }

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ucrt64
        update: false
        path-type: minimal
        pacboy: >-
          gcc:p
          cmake:p
          ninja:p
          make:p
          pkgconf:p

    - name: Restore vcpkg binary cache
      id: restore-vcpkg-binary-cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/vcpkg_binary_cache
        key: ${{ runner.os }}-vcpkg-binary-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'cmake/ConfigureVcpkg.cmake', 'cmake/overlay-triplets/*.cmake', 'cmake/overlay-ports/**') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-binary-${{ env.VCPKG_COMMIT }}-

    - name: Ensure binary cache directory exists
      run: |
        mkdir -p "${{ github.workspace }}/vcpkg_binary_cache"

    - name: Set up vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

    - name: Cache vcpkg downloads
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg/downloads
        key: ${{ runner.os }}-vcpkg-downloads-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'cmake/overlay-ports/**') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-downloads-${{ env.VCPKG_COMMIT }}-

    - name: Cache CMake build directory
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/build
        key: ${{ runner.os }}-cmake-build-${{ hashFiles('CMakeLists.txt', 'src/**', 'include/**', 'cmake/**', 'CMakePresets.json', 'vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-cmake-build-${{ hashFiles('CMakeLists.txt') }}
          ${{ runner.os }}-cmake-build-

    - name: Configure
      run: |
        cmake --preset=release-mingw-x86_64 \
          -DMELONDS_EMBED_BUILD_INFO=ON \
          -DCMAKE_BUILD_PARALLEL_LEVEL=${{ env.CMAKE_BUILD_PARALLEL_LEVEL }}
      env:
        NINJA_STATUS: "[%f/%t %o/s %es] "

    - name: Save vcpkg binary cache
      if: steps.restore-vcpkg-binary-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      continue-on-error: true
      with:
        path: ${{ github.workspace }}/vcpkg_binary_cache
        key: ${{ steps.restore-vcpkg-binary-cache.outputs.cache-primary-key }}

    - name: Build
      run: |
        cmake --build --preset=release-mingw-x86_64 --parallel ${{ env.CMAKE_BUILD_PARALLEL_LEVEL }}
      env:
        NINJA_STATUS: "[%f/%t %o/s %es] "

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: melonPrimeDS-windows-x86_64
        path: ./build/release-mingw-x86_64/melonPrimeDS.exe
