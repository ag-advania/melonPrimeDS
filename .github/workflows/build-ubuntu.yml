name: Ubuntu

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - ci/*
  pull_request:
    branches:
      - master

env:
  MELONDS_GIT_BRANCH: ${{ github.ref }}
  MELONDS_GIT_HASH: ${{ github.sha }}
  MELONDS_BUILD_PROVIDER: GitHub Actions
#  MELONDS_VERSION_SUFFIX: " RC"

jobs:
  build:
    continue-on-error: true
    strategy:
      matrix:
        arch:
          - runner: ubuntu-22.04
            name: x86_64
          - runner: ubuntu-22.04-arm
            name: aarch64

    name: ${{ matrix.arch.name }}
    runs-on: ${{ matrix.arch.runner }}

    steps:
    - uses: actions/checkout@v6
      name: Check out sources

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install --allow-downgrades cmake ninja-build extra-cmake-modules libpcap0.8-dev libsdl2-dev libenet-dev \
          qt6-{base,base-private,multimedia}-dev qt6-wayland libqt6svg6-dev libarchive-dev libzstd-dev libfuse2 libfaad-dev libxi-dev

    - name: Configure
      run: cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DMELONDS_EMBED_BUILD_INFO=ON

    - name: Build
      run: |
        cmake --build build
        DESTDIR=AppDir cmake --install build

    - name: Compress binary
      run: |
        zip -j melonPrimeDS-linux-${{ matrix.arch.name }}.zip AppDir/usr/bin/melonPrimeDS

    - uses: actions/upload-artifact@v7
      with:
        name: melonPrimeDS-linux-${{ matrix.arch.name }}
        path: melonPrimeDS-linux-${{ matrix.arch.name }}.zip
        archive: false

    - name: Fetch AppImage tools
      run: |
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.arch.name }}.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${{ matrix.arch.name }}.AppImage
        chmod a+x linuxdeploy-*.AppImage

    - name: Build the AppImage
      env:
        EXTRA_PLATFORM_PLUGINS: libqwayland-egl.so;libqwayland-generic.so
        EXTRA_QT_PLUGINS: waylandcompositor
        OUTPUT: melonPrimeDS-${{ matrix.arch.name }}.AppImage
        QMAKE: /usr/lib/qt6/bin/qmake
      run: |
        ./linuxdeploy-${{ matrix.arch.name }}.AppImage --appdir AppDir --plugin qt --output appimage

    - name: Compress AppImage
      run: |
        zip -j melonPrimeDS-linux-appimage-${{ matrix.arch.name }}.zip melonPrimeDS-${{ matrix.arch.name }}.AppImage

    - uses: actions/upload-artifact@v7
      with:
        name: melonPrimeDS-linux-appimage-${{ matrix.arch.name }}
        path: melonPrimeDS-linux-appimage-${{ matrix.arch.name }}.zip
        archive: false

  all-artifacts:
    name: All Linux artifacts
    needs: [build]
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
    - name: Download x86_64 binary
      uses: actions/download-artifact@v8
      with:
        name: melonPrimeDS-linux-x86_64
        path: linux-x86_64
        skip-decompress: true

    - name: Download aarch64 binary
      uses: actions/download-artifact@v8
      with:
        name: melonPrimeDS-linux-aarch64
        path: linux-aarch64
        skip-decompress: true

    - name: Download x86_64 AppImage
      uses: actions/download-artifact@v8
      with:
        name: melonPrimeDS-linux-appimage-x86_64
        path: linux-appimage-x86_64
        skip-decompress: true

    - name: Download aarch64 AppImage
      uses: actions/download-artifact@v8
      with:
        name: melonPrimeDS-linux-appimage-aarch64
        path: linux-appimage-aarch64
        skip-decompress: true

    - name: Bundle all Linux artifacts
      run: |
        zip -j melonPrimeDS-linux-all.zip \
          linux-x86_64/melonPrimeDS-linux-x86_64.zip \
          linux-aarch64/melonPrimeDS-linux-aarch64.zip \
          linux-appimage-x86_64/melonPrimeDS-linux-appimage-x86_64.zip \
          linux-appimage-aarch64/melonPrimeDS-linux-appimage-aarch64.zip

    - name: Upload bundled Linux artifacts
      uses: actions/upload-artifact@v7
      with:
        name: melonPrimeDS-linux-all
        path: melonPrimeDS-linux-all.zip
        archive: false
