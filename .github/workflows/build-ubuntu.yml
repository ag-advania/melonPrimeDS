name: Ubuntu

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - ci/*
  pull_request:
    branches:
      - main

env:
  MELONDS_GIT_BRANCH: ${{ github.ref }}
  MELONDS_GIT_HASH: ${{ github.sha }}
  MELONDS_BUILD_PROVIDER: GitHub Actions
#  MELONDS_VERSION_SUFFIX: " RC"

jobs:
  audit:
    name: Audits
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v6
      name: Check out sources

    - name: Check compact Claude layout
      run: python ./tools/maintenance/check-claude-layout.py

    - name: Check Markdown links
      run: python ./tools/maintenance/check-doc-links.py

    - name: Audit config defaults
      shell: pwsh
      run: ./tools/ci/audits/audit-config-defaults.ps1

    - name: Audit HUD key parity
      shell: pwsh
      run: ./tools/ci/audits/audit-hud-key-parity.ps1 -Strict

    - name: Check inc ownership
      shell: pwsh
      run: ./tools/ci/audits/check-inc-ownership.ps1

    - name: Audit Metroid literal budget
      shell: pwsh
      run: ./tools/ci/audits/audit-metroid-literal-budget.ps1 -Budget 1

    - name: Audit platform scatter budget
      shell: pwsh
      run: ./tools/ci/audits/audit-platform-scatter-budget.ps1 -Budget 22

    - name: Audit color dialog prefs
      shell: pwsh
      run: ./tools/ci/audits/audit-color-dialog-prefs.ps1

    - name: Audit MelonPrime SRP performance
      shell: pwsh
      run: ./tools/ci/audits/audit-melonprime-srp-performance.ps1

    - name: Verify generated HUD schema
      shell: pwsh
      run: |
        python ./tools/codegen/hud/generate-hud-prop-schema.py
        git diff --exit-code -- \
          src/frontend/qt_sdl/MelonPrimeHudPropSchema.inc \
          src/frontend/qt_sdl/InputConfig/MelonPrimeInputConfigHudDialogProps.inc \
          src/frontend/qt_sdl/MelonPrimeHudConfigOnScreenEditProps.inc \
          docs/generated/hud/MelonPrimeHudPropSchemaPhase2a.md

  build:
    needs: [audit]
    continue-on-error: true
    strategy:
      matrix:
        arch:
          - runner: ubuntu-22.04
            name: x86_64
          - runner: ubuntu-22.04-arm
            name: aarch64

    name: ${{ matrix.arch.name }}
    runs-on: ${{ matrix.arch.runner }}

    steps:
    - uses: actions/checkout@v6
      name: Check out sources

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install --allow-downgrades cmake ninja-build extra-cmake-modules libpcap0.8-dev libsdl2-dev libenet-dev \
          qt6-{base,base-private,multimedia}-dev qt6-wayland libqt6svg6-dev libarchive-dev libzstd-dev libfuse2 libfaad-dev libxi-dev \
          wayland-protocols libwayland-bin libvulkan-dev mesa-vulkan-drivers vulkan-validationlayers xvfb

    - name: Configure
      run: cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DMELONDS_EMBED_BUILD_INFO=ON -DMELONPRIME_ENABLE_DEVELOPER_FEATURES=OFF -DMELONPRIME_WAYLAND_POINTER_LOCK=ON -DMELONPRIME_ENABLE_VULKAN=ON -DMELONPRIME_FORCE_DISABLE_VULKAN=OFF

    - name: Build
      run: |
        cmake --build build
        DESTDIR=AppDir cmake --install build

    - name: Build with Vulkan completely disabled
      run: |
        cmake -B build-vulkan-off -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DMELONPRIME_ENABLE_DEVELOPER_FEATURES=OFF -DMELONPRIME_WAYLAND_POINTER_LOCK=ON -DMELONPRIME_ENABLE_VULKAN=OFF -DMELONPRIME_FORCE_DISABLE_VULKAN=ON
        cmake --build build-vulkan-off

    - name: Build Vulkan debug validation configuration
      if: matrix.arch.name == 'x86_64'
      run: |
        cmake -B build-validation -G Ninja -DCMAKE_BUILD_TYPE=Debug -DMELONPRIME_ENABLE_DEVELOPER_FEATURES=OFF -DMELONPRIME_WAYLAND_POINTER_LOCK=ON -DMELONPRIME_ENABLE_VULKAN=ON -DMELONPRIME_FORCE_DISABLE_VULKAN=OFF
        cmake --build build-validation

    - name: Run Vulkan validation smoke test
      if: matrix.arch.name == 'x86_64'
      run: |
        mkdir -p build-validation/portable
        printf '3D.Renderer = 3\nScreen.VSync = false\n' > build-validation/portable/melonDS.toml
        set +e
        SDL_AUDIODRIVER=dummy timeout 12s xvfb-run -a ./build-validation/melonPrimeDS > build-validation/vulkan-validation.log 2>&1
        status=$?
        set -e
        test "$status" -eq 0 -o "$status" -eq 124
        grep -F 'VulkanContext: instance API=1.1 validation=1' build-validation/vulkan-validation.log
        grep -F 'VulkanPresenter: initialized' build-validation/vulkan-validation.log
        ! grep -E 'VUID-|VulkanValidation:.*(ERROR|Error)' build-validation/vulkan-validation.log

    - name: Verify developer HUD golden harness is absent from release binary
      run: |
        ! strings AppDir/usr/bin/melonPrimeDS | grep -E 'melonprime-hud-golden|MelonPrime HUD golden|CustomHud_RunGoldenHarness'

    - name: Compress binary
      run: |
        zip -j melonPrimeDS-linux-${{ matrix.arch.name }}.zip AppDir/usr/bin/melonPrimeDS

    - uses: actions/upload-artifact@v7
      with:
        name: melonPrimeDS-linux-${{ matrix.arch.name }}
        path: melonPrimeDS-linux-${{ matrix.arch.name }}.zip
        archive: false

    - name: Fetch AppImage tools
      run: |
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.arch.name }}.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${{ matrix.arch.name }}.AppImage
        chmod a+x linuxdeploy-*.AppImage

    - name: Build the AppImage
      env:
        EXTRA_PLATFORM_PLUGINS: libqwayland-egl.so;libqwayland-generic.so
        EXTRA_QT_PLUGINS: waylandcompositor
        OUTPUT: melonPrimeDS-${{ matrix.arch.name }}.AppImage
        QMAKE: /usr/lib/qt6/bin/qmake
      run: |
        ./linuxdeploy-${{ matrix.arch.name }}.AppImage --appdir AppDir --plugin qt --output appimage

    - name: Compress AppImage
      run: |
        zip -j melonPrimeDS-linux-appimage-${{ matrix.arch.name }}.zip melonPrimeDS-${{ matrix.arch.name }}.AppImage

    - uses: actions/upload-artifact@v7
      with:
        name: melonPrimeDS-linux-appimage-${{ matrix.arch.name }}
        path: melonPrimeDS-linux-appimage-${{ matrix.arch.name }}.zip
        archive: false

  all-artifacts:
    name: All Linux artifacts
    needs: [build]
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
    - name: Download x86_64 binary
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: melonPrimeDS-linux-x86_64.zip
        path: linux-x86_64
        skip-decompress: true

    - name: Download aarch64 binary
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: melonPrimeDS-linux-aarch64.zip
        path: linux-aarch64
        skip-decompress: true

    - name: Download x86_64 AppImage
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: melonPrimeDS-linux-appimage-x86_64.zip
        path: linux-appimage-x86_64
        skip-decompress: true

    - name: Download aarch64 AppImage
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: melonPrimeDS-linux-appimage-aarch64.zip
        path: linux-appimage-aarch64
        skip-decompress: true

    - name: Bundle all Linux artifacts
      run: |
        artifacts=()
        for f in \
          linux-x86_64/melonPrimeDS-linux-x86_64.zip \
          linux-aarch64/melonPrimeDS-linux-aarch64.zip \
          linux-appimage-x86_64/melonPrimeDS-linux-appimage-x86_64.zip \
          linux-appimage-aarch64/melonPrimeDS-linux-appimage-aarch64.zip
        do
          if [ -f "$f" ]; then
            artifacts+=("$f")
          fi
        done
        if [ ${#artifacts[@]} -eq 0 ]; then
          echo "No Linux artifacts available to bundle"
          exit 1
        fi
        zip -j melonPrimeDS-linux-all.zip "${artifacts[@]}"

    - name: Upload bundled Linux artifacts
      uses: actions/upload-artifact@v7
      with:
        name: melonPrimeDS-linux-all
        path: melonPrimeDS-linux-all.zip
        archive: false
